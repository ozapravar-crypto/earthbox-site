      <circle cx="335" cy="445" r="1.4"/>
      <circle cx="350" cy="442" r="1.1"/>
      <circle cx="365" cy="448" r="1.3"/>
      <circle cx="380" cy="445" r="1.2"/>
      <circle cx="395" cy="450" r="1.3"/>
      <circle cx="410" cy="444" r="1.2"/>
      <circle cx="425" cy="448" r="1.3"/>
      <circle cx="328" cy="460" r="1.3"/>
      <circle cx="345" cy="465" r="1.2"/>
      <circle cx="362" cy="468" r="1.2"/>
      <circle cx="382" cy="468" r="1.3"/>
      <circle cx="400" cy="465" r="1.2"/>
      <circle cx="418" cy="460" r="1.3"/>
      <circle cx="354" cy="480" r="1.1"/>
      <circle cx="372" cy="484" r="1.2"/>
