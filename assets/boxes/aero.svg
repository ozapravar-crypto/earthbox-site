      <circle cx="382" cy="528" r="1.3"/>
      <circle cx="358" cy="540" r="1.2"/>
      <circle cx="386" cy="540" r="1.2"/>
      <circle cx="354" cy="552" r="1.1"/>
      <circle cx="390" cy="552" r="1.1"/>
      <circle cx="352" cy="564" r="1.0"/>
