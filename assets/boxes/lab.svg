             C 285 506, 310 504, 335 510
             C 360 514, 390 506, 415 510
             C 440 514, 465 510, 487 514
             L 487 545
             C 465 543, 440 545, 415 543
             C 390 540, 360 543, 335 545
             C 310 543, 285 545, 259 545 Z"
          fill="#bdbeb8"/>

    <!-- Fine grit speckles in gray band -->
    <g fill="#3a3b35" opacity="0.85">
      <circle cx="270" cy="518" r="0.6"/>
      <circle cx="278" cy="525" r="0.7"/>
      <circle cx="286" cy="520" r="0.6"/>
      <circle cx="294" cy="528" r="0.6"/>
      <circle cx="302" cy="522" r="0.7"/>
      <circle cx="310" cy="530" r="0.6"/>
      <circle cx="318" cy="524" r="0.6"/>
      <circle cx="326" cy="532" r="0.7"/>
      <circle cx="334" cy="525" r="0.6"/>
      <circle cx="342" cy="535" r="0.6"/>
      <circle cx="350" cy="528" r="0.6"/>
      <circle cx="358" cy="538" r="0.7"/>
      <circle cx="366" cy="530" r="0.6"/>
      <circle cx="374" cy="538" r="0.7"/>
      <circle cx="382" cy="528" r="0.6"/>
      <circle cx="390" cy="538" r="0.6"/>
      <circle cx="398" cy="528" r="0.7"/>
      <circle cx="406" cy="538" r="0.6"/>
      <circle cx="414" cy="528" r="0.6"/>
      <circle cx="422" cy="535" r="0.7"/>
      <circle cx="430" cy="528" r="0.6"/>
      <circle cx="438" cy="535" r="0.6"/>
      <circle cx="446" cy="528" r="0.7"/>
      <circle cx="454" cy="535" r="0.6"/>
      <circle cx="462" cy="528" r="0.6"/>
      <circle cx="470" cy="535" r="0.7"/>
      <circle cx="478" cy="528" r="0.6"/>
      <circle cx="275" cy="535" r="0.6"/>
      <circle cx="298" cy="538" r="0.6"/>
      <circle cx="322" cy="540" r="0.6"/>
      <circle cx="348" cy="540" r="0.6"/>
      <circle cx="378" cy="540" r="0.6"/>
      <circle cx="408" cy="542" r="0.6"/>
      <circle cx="436" cy="540" r="0.6"/>
      <circle cx="464" cy="542" r="0.6"/>
    </g>

    <!-- Edge highlight strip on top of gray band -->
    <path d="M 264 514 Q 320 510, 372 513 Q 430 516, 482 512" stroke="#e6e6df" stroke-width="0.8" fill="none" opacity="0.65"/>

  </g>

  <!-- Outer frame -->
