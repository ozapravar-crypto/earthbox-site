<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 746 746" width="746" height="746">
  <defs>
    <clipPath id="inner-frame">
      <path d="M 287 144 L 459 144 L 480 165 L 480 581 L 459 602 L 287 602 L 265 581 L 265 165 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#inner-frame)">

    <!-- Olive moon -->
    <circle cx="431" cy="232" r="12" fill="#67684A"/>

    <!-- ===== ISOMETRIC WIREFRAME CUBE ===== -->
    <!-- Cube center at (372, 432), edge length ~40 in iso projection -->
    <g stroke="#1c1c18" stroke-width="1.5" fill="none" stroke-linejoin="miter" stroke-linecap="round">
      <!-- Hexagonal outline (cube silhouette) -->
      <polygon points="372,395 410,415 410,455 372,475 334,455 334,415"/>
      <!-- Three inner edges meeting at center (showing 3D faces) -->
      <line x1="334" y1="415" x2="372" y2="435"/>
      <line x1="410" y1="415" x2="372" y2="435"/>
      <line x1="372" y1="475" x2="372" y2="435"/>
    </g>

    <!-- ===== GRAINY GROUND STRIP ===== -->
    <!-- Base solid black -->
    <rect x="259" y="540" width="228" height="70" fill="#0a0b07"/>

    <!-- Gray gritty band on top -->
