    <g fill="#525a3a" opacity="0.55">
      <circle cx="285" cy="498" r="1.4"/>
      <circle cx="305" cy="495" r="1.3"/>
      <circle cx="328" cy="493" r="1.4"/>
      <circle cx="354" cy="496" r="1.3"/>
      <circle cx="383" cy="493" r="1.4"/>
      <circle cx="408" cy="494" r="1.3"/>
      <circle cx="436" cy="495" r="1.3"/>
      <circle cx="460" cy="496" r="1.2"/>
      <circle cx="294" cy="516" r="1.3"/>
      <circle cx="324" cy="515" r="1.3"/>
      <circle cx="362" cy="516" r="1.3"/>
      <circle cx="396" cy="518" r="1.3"/>
      <circle cx="428" cy="518" r="1.3"/>
      <circle cx="455" cy="520" r="1.2"/>
      <circle cx="298" cy="540" r="1.2"/>
      <circle cx="332" cy="540" r="1.3"/>
      <circle cx="372" cy="540" r="1.3"/>
      <circle cx="412" cy="542" r="1.2"/>
      <circle cx="447" cy="544" r="1.2"/>
    </g>
  </g>

  <!-- Outer frame -->
  <path d="M 282 131 L 463 131 L 493 161 L 493 585 L 463 615 L 282 615 L 252 585 L 252 161 Z"
        fill="none" stroke="#000" stroke-width="3.5" stroke-linejoin="miter"/>
  <!-- Inner thin frame -->
  <path d="M 287 144 L 459 144 L 480 165 L 480 581 L 459 602 L 287 602 L 265 581 L 265 165 Z"
        fill="none" stroke="#000" stroke-width="1.2" stroke-linejoin="miter"/>
</svg>
