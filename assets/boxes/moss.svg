      <circle cx="365" cy="320" r="1.2"/><circle cx="360" cy="322" r="1.2"/>
      <circle cx="381" cy="320" r="1.2"/><circle cx="386" cy="322" r="1.2"/>
      <!-- frond 2 -->
      <circle cx="365" cy="335" r="1.3"/><circle cx="358" cy="338" r="1.3"/><circle cx="353" cy="340" r="1.3"/>
      <circle cx="381" cy="335" r="1.3"/><circle cx="388" cy="338" r="1.3"/><circle cx="393" cy="340" r="1.3"/>
      <!-- frond 3 -->
      <circle cx="364" cy="350" r="1.4"/><circle cx="356" cy="354" r="1.4"/><circle cx="349" cy="358" r="1.4"/>
      <circle cx="382" cy="350" r="1.4"/><circle cx="390" cy="354" r="1.4"/><circle cx="397" cy="358" r="1.4"/>
      <!-- frond 4 -->
      <circle cx="362" cy="365" r="1.5"/><circle cx="353" cy="370" r="1.5"/><circle cx="345" cy="374" r="1.5"/>
      <circle cx="384" cy="365" r="1.5"/><circle cx="393" cy="370" r="1.5"/><circle cx="401" cy="374" r="1.5"/>
      <!-- frond 5 -->
      <circle cx="361" cy="380" r="1.5"/><circle cx="350" cy="386" r="1.5"/><circle cx="340" cy="391" r="1.5"/>
