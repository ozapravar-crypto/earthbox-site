      <!-- frond 6 -->
      <circle cx="360" cy="395" r="1.6"/><circle cx="348" cy="402" r="1.6"/><circle cx="335" cy="408" r="1.6"/>
      <circle cx="386" cy="395" r="1.6"/><circle cx="398" cy="402" r="1.6"/><circle cx="411" cy="408" r="1.6"/>
      <!-- frond 7 -->
      <circle cx="358" cy="410" r="1.6"/><circle cx="345" cy="418" r="1.6"/><circle cx="331" cy="425" r="1.6"/>
      <circle cx="388" cy="410" r="1.6"/><circle cx="401" cy="418" r="1.6"/><circle cx="415" cy="425" r="1.6"/>
      <!-- frond 8 -->
      <circle cx="358" cy="425" r="1.7"/><circle cx="343" cy="434" r="1.7"/><circle cx="328" cy="442" r="1.7"/>
      <circle cx="388" cy="425" r="1.7"/><circle cx="403" cy="434" r="1.7"/><circle cx="418" cy="442" r="1.7"/>
      <!-- frond 9 -->
      <circle cx="356" cy="441" r="1.7"/><circle cx="340" cy="450" r="1.7"/><circle cx="326" cy="459" r="1.7"/>
      <circle cx="390" cy="441" r="1.7"/><circle cx="406" cy="450" r="1.7"/><circle cx="420" cy="459" r="1.7"/>
      <!-- frond 10 -->
      <circle cx="354" cy="457" r="1.8"/><circle cx="338" cy="466" r="1.8"/><circle cx="324" cy="475" r="1.8"/>
      <circle cx="392" cy="457" r="1.8"/><circle cx="408" cy="466" r="1.8"/><circle cx="422" cy="475" r="1.8"/>
      <!-- frond 11 -->
      <circle cx="358" cy="472" r="1.7"/><circle cx="343" cy="481" r="1.7"/><circle cx="330" cy="486" r="1.7"/>
      <circle cx="388" cy="472" r="1.7"/><circle cx="403" cy="481" r="1.7"/><circle cx="416" cy="486" r="1.7"/>
    </g>

    <!-- ===== LUMPY MOSS HILLS ===== -->
    <!-- Back layer: lots of round bumps (lighter olive) -->
    <path d="M 259 502
             C 268 488, 282 484, 290 492
             C 298 482, 312 482, 320 490
             C 330 478, 348 478, 358 488
             C 368 478, 388 478, 398 488
             C 408 480, 425 480, 435 490
             C 445 482, 460 482, 470 492
             C 478 488, 485 494, 487 500
             L 487 610 L 259 610 Z"
          fill="#3d4329"/>

    <!-- Mid layer bumps -->
    <path d="M 259 524
             C 270 510, 285 508, 295 516
             C 305 506, 322 506, 332 516
             C 342 508, 360 508, 372 518
             C 384 510, 402 510, 414 520
             C 425 512, 442 512, 455 522
             C 468 516, 480 518, 487 524
             L 487 610 L 259 610 Z"
          fill="#2c3220"/>

    <!-- Foreground darker bumps (rounder, larger) -->
