      <path d="M 373 305 C 372 300, 372 297, 374 293"/>

      <!-- frond 1 -->
      <path d="M 373 318 Q 363 320, 356 324"/>
      <path d="M 373 318 Q 383 320, 390 324"/>
      <!-- frond 2 -->
      <path d="M 373 333 Q 360 336, 350 342"/>
      <path d="M 373 333 Q 386 336, 396 342"/>
      <!-- frond 3 -->
      <path d="M 373 348 Q 358 352, 346 360"/>
      <path d="M 373 348 Q 388 352, 400 360"/>
      <!-- frond 4 -->
      <path d="M 373 362 Q 354 367, 340 376"/>
      <path d="M 373 362 Q 392 367, 406 376"/>
      <!-- frond 5 -->
      <path d="M 373 377 Q 351 383, 335 393"/>
      <path d="M 373 377 Q 395 383, 411 393"/>
      <!-- frond 6 -->
      <path d="M 373 391 Q 348 398, 330 410"/>
      <path d="M 373 391 Q 398 398, 416 410"/>
      <!-- frond 7 -->
      <path d="M 373 406 Q 345 414, 326 427"/>
      <path d="M 373 406 Q 401 414, 420 427"/>
      <!-- frond 8 -->
      <path d="M 373 421 Q 343 430, 322 444"/>
      <path d="M 373 421 Q 403 430, 424 444"/>
      <!-- frond 9 -->
      <path d="M 373 436 Q 341 446, 320 461"/>
      <path d="M 373 436 Q 405 446, 426 461"/>
      <!-- frond 10 (longest, near base) -->
      <path d="M 373 451 Q 339 462, 318 478"/>
      <path d="M 373 451 Q 407 462, 428 478"/>
      <!-- frond 11 -->
      <path d="M 373 466 Q 343 477, 324 488"/>
      <path d="M 373 466 Q 403 477, 422 488"/>
    </g>

