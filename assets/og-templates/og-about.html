<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .bg-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 30% 70%, rgba(76, 175, 80, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(76, 175, 80, 0.08) 0%, transparent 40%);
    }
    .content {
      text-align: center;
      z-index: 1;
      max-width: 800px;
    }
    .eyebrow {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 30px;
    }
    h1 {
      font-size: 64px;
      font-weight: normal;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.6), transparent);
      margin: 0 auto 30px;
    }
    .description {
      font-size: 24px;
      color: rgba(255,255,255,0.7);
      font-style: italic;
      line-height: 1.6;
      max-width: 600px;
      margin: 0 auto;
    }
    .location {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 16px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 3px;
    }
    .founder {
      margin-top: 40px;
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="content">
    <div class="eyebrow">About</div>
    <h1>EarthBox</h1>
    <div class="divider"></div>
    <p class="description">A small studio crafting terrariums and 3D-printed plant accessories as design objects.</p>
    <p class="founder">Founded by Aayush Lilani</p>
  </div>
  <div class="location">Kandivali, Mumbai</div>
</body>
</html>
