<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .bg-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 20% 80%, rgba(76, 175, 80, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(76, 175, 80, 0.08) 0%, transparent 40%);
    }
    .content {
      text-align: center;
      z-index: 1;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 40px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: #2d2d2d;
      font-weight: bold;
    }
    h1 {
      font-size: 72px;
      font-weight: normal;
      letter-spacing: 4px;
      margin-bottom: 20px;
    }
    .tagline {
      font-size: 28px;
      color: rgba(255,255,255,0.7);
      font-style: italic;
      letter-spacing: 2px;
    }
    .location {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .accent {
      position: absolute;
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(76, 175, 80, 0.6), transparent);
      top: 50%;
      left: 50%;
      transform: translate(-50%, 80px);
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="content">
    <div class="logo">E</div>
    <h1>EarthBox</h1>
    <div class="accent"></div>
    <p class="tagline">Contained Worlds</p>
  </div>
  <div class="location">Mumbai, India</div>
</body>
</html>
