<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      font-family: 'Georgia', serif;
      display: flex;
      align-items: center;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .bg-pattern {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(circle at 10% 90%, rgba(76, 175, 80, 0.12) 0%, transparent 50%),
                        radial-gradient(circle at 90% 10%, rgba(76, 175, 80, 0.08) 0%, transparent 40%);
    }
    .left {
      flex: 1;
      padding: 80px;
      z-index: 1;
    }
    .right {
      width: 500px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 20px;
      padding-right: 60px;
      z-index: 1;
    }
    .eyebrow {
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 20px;
    }
    h1 {
      font-size: 56px;
      font-weight: normal;
      letter-spacing: 2px;
      line-height: 1.2;
      margin-bottom: 24px;
    }
    .subtitle {
      font-size: 22px;
      color: rgba(255,255,255,0.7);
      font-style: italic;
      line-height: 1.5;
    }
    .volume {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid rgba(76, 175, 80, 0.6);
      padding: 16px 20px;
      font-size: 16px;
    }
    .volume-num {
      color: rgba(76, 175, 80, 0.8);
      font-size: 14px;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }
    .volume-title {
      color: rgba(255,255,255,0.9);
    }
    .brand {
      position: absolute;
      bottom: 40px;
      left: 80px;
      font-size: 18px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="left">
    <div class="eyebrow">EarthBox</div>
    <h1>The Catalogue</h1>
    <p class="subtitle">3D printed plant accessories<br>& handcrafted terrariums</p>
  </div>
  <div class="right">
    <div class="volume">
      <div class="volume-num">Volume I</div>
      <div class="volume-title">3D Printed Accessories</div>
    </div>
    <div class="volume">
      <div class="volume-num">Volume II</div>
      <div class="volume-title">Elemental Boxes</div>
    </div>
    <div class="volume">
      <div class="volume-num">Volume III</div>
      <div class="volume-title">Digital Vivariums</div>
    </div>
  </div>
  <div class="brand">Mumbai, India</div>
</body>
</html>
