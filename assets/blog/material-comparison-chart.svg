<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" fill="none">
  <style>
    .label { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #4A4A4A; }
    .title { font-family: 'Oranienbaum', serif; font-size: 20px; fill: #2C2C2B; }
    .header { font-family: 'Quattrocento Sans', sans-serif; font-size: 12px; fill: #2C2C2B; font-weight: bold; }
    .material { font-family: 'Oranienbaum', serif; font-size: 16px; fill: #2C2C2B; }
    .cell { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #4A4A4A; }
    .good { fill: #6B8E5A; }
    .medium { fill: #F5D76E; }
    .poor { fill: #E67E22; }
  </style>

  <!-- Background -->
  <rect width="700" height="400" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" class="title">3D Printing Materials for Planters: Comparison</text>

  <!-- Table structure -->
  <!-- Header row -->
  <rect x="50" y="60" width="120" height="40" fill="#B8A99A"/>
  <rect x="170" y="60" width="100" height="40" fill="#B8A99A"/>
  <rect x="270" y="60" width="100" height="40" fill="#B8A99A"/>
  <rect x="370" y="60" width="100" height="40" fill="#B8A99A"/>
  <rect x="470" y="60" width="100" height="40" fill="#B8A99A"/>
  <rect x="570" y="60" width="80" height="40" fill="#B8A99A"/>

  <text x="110" y="85" text-anchor="middle" class="header" style="fill:#F8F7F5;">Property</text>
  <text x="220" y="85" text-anchor="middle" class="header" style="fill:#F8F7F5;">PLA</text>
  <text x="320" y="85" text-anchor="middle" class="header" style="fill:#F8F7F5;">ABS</text>
  <text x="420" y="85" text-anchor="middle" class="header" style="fill:#F8F7F5;">PETG</text>
  <text x="520" y="85" text-anchor="middle" class="header" style="fill:#F8F7F5;">ASA</text>
  <text x="610" y="85" text-anchor="middle" class="header" style="fill:#F8F7F5;">Best For</text>

  <!-- Row 1: UV Resistance -->
  <rect x="50" y="100" width="120" height="45" fill="#EFECE5" stroke="#E5E2DB"/>
  <rect x="170" y="100" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="270" y="100" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="370" y="100" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="470" y="100" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="570" y="100" width="80" height="45" fill="#EFECE5" stroke="#E5E2DB"/>

  <text x="110" y="127" text-anchor="middle" class="header">UV Resistance</text>
  <circle cx="220" cy="122" r="12" class="poor"/>
  <text x="220" y="127" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Poor</text>
  <circle cx="320" cy="122" r="12" class="medium"/>
  <text x="320" y="127" text-anchor="middle" style="fill:#2C2C2B; font-size:10px;">Fair</text>
  <circle cx="420" cy="122" r="12" class="medium"/>
  <text x="420" y="127" text-anchor="middle" style="fill:#2C2C2B; font-size:10px;">Fair</text>
  <circle cx="520" cy="122" r="12" class="good"/>
  <text x="520" y="127" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Best</text>
  <text x="610" y="127" text-anchor="middle" class="cell">ASA</text>

  <!-- Row 2: Moisture Resistance -->
  <rect x="50" y="145" width="120" height="45" fill="#EFECE5" stroke="#E5E2DB"/>
  <rect x="170" y="145" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="270" y="145" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="370" y="145" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="470" y="145" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="570" y="145" width="80" height="45" fill="#EFECE5" stroke="#E5E2DB"/>

  <text x="110" y="172" text-anchor="middle" class="header">Moisture</text>
  <circle cx="220" cy="167" r="12" class="poor"/>
  <text x="220" y="172" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Poor</text>
  <circle cx="320" cy="167" r="12" class="good"/>
  <text x="320" y="172" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Good</text>
  <circle cx="420" cy="167" r="12" class="good"/>
  <text x="420" y="172" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Good</text>
  <circle cx="520" cy="167" r="12" class="good"/>
  <text x="520" y="172" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Good</text>
  <text x="610" y="172" text-anchor="middle" class="cell">ABS/PETG</text>

  <!-- Row 3: Heat Resistance -->
  <rect x="50" y="190" width="120" height="45" fill="#EFECE5" stroke="#E5E2DB"/>
  <rect x="170" y="190" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="270" y="190" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="370" y="190" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="470" y="190" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="570" y="190" width="80" height="45" fill="#EFECE5" stroke="#E5E2DB"/>

  <text x="110" y="217" text-anchor="middle" class="header">Heat Tolerance</text>
  <circle cx="220" cy="212" r="12" class="poor"/>
  <text x="220" y="217" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">55°C</text>
  <circle cx="320" cy="212" r="12" class="good"/>
  <text x="320" y="217" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">95°C</text>
  <circle cx="420" cy="212" r="12" class="medium"/>
  <text x="420" y="217" text-anchor="middle" style="fill:#2C2C2B; font-size:10px;">75°C</text>
  <circle cx="520" cy="212" r="12" class="good"/>
  <text x="520" y="217" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">95°C</text>
  <text x="610" y="217" text-anchor="middle" class="cell">ABS/ASA</text>

  <!-- Row 4: Ease of Printing -->
  <rect x="50" y="235" width="120" height="45" fill="#EFECE5" stroke="#E5E2DB"/>
  <rect x="170" y="235" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="270" y="235" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="370" y="235" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="470" y="235" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="570" y="235" width="80" height="45" fill="#EFECE5" stroke="#E5E2DB"/>

  <text x="110" y="262" text-anchor="middle" class="header">Print Ease</text>
  <circle cx="220" cy="257" r="12" class="good"/>
  <text x="220" y="262" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Easy</text>
  <circle cx="320" cy="257" r="12" class="poor"/>
  <text x="320" y="262" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Hard</text>
  <circle cx="420" cy="257" r="12" class="medium"/>
  <text x="420" y="262" text-anchor="middle" style="fill:#2C2C2B; font-size:10px;">Med</text>
  <circle cx="520" cy="257" r="12" class="poor"/>
  <text x="520" y="262" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Hard</text>
  <text x="610" y="262" text-anchor="middle" class="cell">PLA</text>

  <!-- Row 5: Biodegradable -->
  <rect x="50" y="280" width="120" height="45" fill="#EFECE5" stroke="#E5E2DB"/>
  <rect x="170" y="280" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="270" y="280" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="370" y="280" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="470" y="280" width="100" height="45" fill="#F8F7F5" stroke="#E5E2DB"/>
  <rect x="570" y="280" width="80" height="45" fill="#EFECE5" stroke="#E5E2DB"/>

  <text x="110" y="307" text-anchor="middle" class="header">Eco-Friendly</text>
  <circle cx="220" cy="302" r="12" class="good"/>
  <text x="220" y="307" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">Yes</text>
  <circle cx="320" cy="302" r="12" class="poor"/>
  <text x="320" y="307" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">No</text>
  <circle cx="420" cy="302" r="12" class="medium"/>
  <text x="420" y="307" text-anchor="middle" style="fill:#2C2C2B; font-size:10px;">Partial</text>
  <circle cx="520" cy="302" r="12" class="poor"/>
  <text x="520" y="307" text-anchor="middle" style="fill:#F8F7F5; font-size:10px;">No</text>
  <text x="610" y="307" text-anchor="middle" class="cell">PLA</text>

  <!-- Recommendation box -->
  <rect x="50" y="340" width="600" height="50" rx="6" fill="#6B8E5A" opacity="0.15" stroke="#6B8E5A" stroke-width="1.5"/>
  <text x="350" y="362" text-anchor="middle" class="header" style="fill:#6B8E5A;">Recommendation</text>
  <text x="350" y="380" text-anchor="middle" class="cell">Indoor planters: PLA or PETG · Outdoor planters: ASA or ABS · Terrariums: PLA (low moisture contact)</text>
</svg>