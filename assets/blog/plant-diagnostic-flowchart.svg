<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 600" fill="none">
  <style>
    .label { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #4A4A4A; }
    .title { font-family: 'Oranienbaum', serif; font-size: 20px; fill: #2C2C2B; }
    .question { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #2C2C2B; font-weight: bold; }
    .answer { font-family: 'Quattrocento Sans', sans-serif; font-size: 10px; fill: #F8F7F5; }
    .solution { font-family: 'Quattrocento Sans', sans-serif; font-size: 10px; fill: #2C2C2B; }
    .yesno { font-family: 'Quattrocento Sans', sans-serif; font-size: 9px; fill: #787878; font-weight: bold; }
  </style>

  <!-- Background -->
  <rect width="700" height="600" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title">Plant Problem Diagnostic Flowchart</text>

  <!-- START -->
  <ellipse cx="350" cy="70" rx="60" ry="25" fill="#B8A99A"/>
  <text x="350" y="75" text-anchor="middle" class="answer">Plant looks unwell?</text>

  <!-- Arrow down -->
  <line x1="350" y1="95" x2="350" y2="120" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Q1: Yellow Leaves? -->
  <rect x="250" y="120" width="200" height="40" rx="4" fill="#EFECE5" stroke="#2C2C2B" stroke-width="1.5"/>
  <text x="350" y="145" text-anchor="middle" class="question">Are leaves turning yellow?</text>

  <!-- YES arrow to right -->
  <line x1="450" y1="140" x2="520" y2="140" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="135" class="yesno">YES</text>

  <!-- NO arrow down -->
  <line x1="350" y1="160" x2="350" y2="200" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="185" class="yesno">NO</text>

  <!-- Yellow leaves branch -->
  <rect x="520" y="115" width="160" height="50" rx="4" fill="#EFECE5" stroke="#9A8A7B" stroke-width="1"/>
  <text x="600" y="133" text-anchor="middle" class="question">Is soil wet?</text>
  <text x="600" y="148" text-anchor="middle" class="label">(check with finger)</text>

  <!-- Wet soil = overwatering -->
  <line x1="600" y1="165" x2="600" y2="195" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="610" y="183" class="yesno">YES</text>
  <rect x="520" y="195" width="160" height="55" rx="4" fill="#6B8E5A"/>
  <text x="600" y="213" text-anchor="middle" class="answer">OVERWATERING</text>
  <text x="600" y="228" text-anchor="middle" class="answer" style="font-size:9px;">• Reduce watering</text>
  <text x="600" y="242" text-anchor="middle" class="answer" style="font-size:9px;">• Improve drainage</text>

  <!-- Q2: Brown Tips? -->
  <rect x="250" y="200" width="200" height="40" rx="4" fill="#EFECE5" stroke="#2C2C2B" stroke-width="1.5"/>
  <text x="350" y="225" text-anchor="middle" class="question">Brown, crispy leaf tips?</text>

  <!-- YES arrow to left -->
  <line x1="250" y1="220" x2="180" y2="220" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="210" y="215" class="yesno">YES</text>

  <!-- NO arrow down -->
  <line x1="350" y1="240" x2="350" y2="280" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="265" class="yesno">NO</text>

  <!-- Brown tips solution -->
  <rect x="20" y="195" width="160" height="55" rx="4" fill="#6BA3BE"/>
  <text x="100" y="213" text-anchor="middle" class="answer">LOW HUMIDITY</text>
  <text x="100" y="228" text-anchor="middle" class="answer" style="font-size:9px;">• Mist regularly</text>
  <text x="100" y="242" text-anchor="middle" class="answer" style="font-size:9px;">• Add humidity tray</text>

  <!-- Q3: Leggy/Stretched? -->
  <rect x="250" y="280" width="200" height="40" rx="4" fill="#EFECE5" stroke="#2C2C2B" stroke-width="1.5"/>
  <text x="350" y="305" text-anchor="middle" class="question">Leggy, stretched growth?</text>

  <!-- YES arrow to right -->
  <line x1="450" y1="300" x2="520" y2="300" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="295" class="yesno">YES</text>

  <!-- NO arrow down -->
  <line x1="350" y1="320" x2="350" y2="360" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="345" class="yesno">NO</text>

  <!-- Leggy solution -->
  <rect x="520" y="275" width="160" height="55" rx="4" fill="#F5D76E"/>
  <text x="600" y="293" text-anchor="middle" style="fill:#2C2C2B; font-size:11px; font-weight:bold;">LOW LIGHT</text>
  <text x="600" y="308" text-anchor="middle" class="solution">• Move closer to window</text>
  <text x="600" y="322" text-anchor="middle" class="solution">• Add grow light</text>

  <!-- Q4: Wilting? -->
  <rect x="250" y="360" width="200" height="40" rx="4" fill="#EFECE5" stroke="#2C2C2B" stroke-width="1.5"/>
  <text x="350" y="385" text-anchor="middle" class="question">Wilting or drooping?</text>

  <!-- YES arrow to left -->
  <line x1="250" y1="380" x2="180" y2="380" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="210" y="375" class="yesno">YES</text>

  <!-- NO arrow down -->
  <line x1="350" y1="400" x2="350" y2="440" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="425" class="yesno">NO</text>

  <!-- Wilting branch -->
  <rect x="20" y="355" width="160" height="50" rx="4" fill="#EFECE5" stroke="#9A8A7B" stroke-width="1"/>
  <text x="100" y="375" text-anchor="middle" class="question">Is soil dry?</text>

  <!-- Dry = underwatering -->
  <line x1="20" y1="380" x2="-30" y2="380" stroke="#787878" stroke-width="1.5"/>
  <line x1="-30" y1="380" x2="-30" y2="450" stroke="#787878" stroke-width="1.5"/>
  <line x1="-30" y1="450" x2="20" y2="450" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="-20" y="415" class="yesno">YES</text>
  <rect x="20" y="425" width="160" height="55" rx="4" fill="#E67E22"/>
  <text x="100" y="443" text-anchor="middle" class="answer">UNDERWATERING</text>
  <text x="100" y="458" text-anchor="middle" class="answer" style="font-size:9px;">• Water thoroughly</text>
  <text x="100" y="472" text-anchor="middle" class="answer" style="font-size:9px;">• Check more often</text>

  <!-- Q5: Pests? -->
  <rect x="250" y="440" width="200" height="40" rx="4" fill="#EFECE5" stroke="#2C2C2B" stroke-width="1.5"/>
  <text x="350" y="458" text-anchor="middle" class="question">Spots, webs, or sticky residue?</text>
  <text x="350" y="472" text-anchor="middle" class="label">(check leaf undersides)</text>

  <!-- YES arrow to right -->
  <line x1="450" y1="460" x2="520" y2="460" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="480" y="455" class="yesno">YES</text>

  <!-- NO arrow down -->
  <line x1="350" y1="480" x2="350" y2="520" stroke="#787878" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="360" y="505" class="yesno">NO</text>

  <!-- Pest solution -->
  <rect x="520" y="435" width="160" height="55" rx="4" fill="#C0392B"/>
  <text x="600" y="453" text-anchor="middle" class="answer">PEST INFESTATION</text>
  <text x="600" y="468" text-anchor="middle" class="answer" style="font-size:9px;">• Isolate plant</text>
  <text x="600" y="482" text-anchor="middle" class="answer" style="font-size:9px;">• Treat with neem oil</text>

  <!-- Healthy plant end -->
  <ellipse cx="350" cy="550" rx="100" ry="30" fill="#6B8E5A"/>
  <text x="350" y="545" text-anchor="middle" class="answer" style="font-size:12px;">Plant may be healthy!</text>
  <text x="350" y="560" text-anchor="middle" class="answer" style="font-size:9px;">Some leaf drop is normal</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#787878"/>
    </marker>
  </defs>
</svg>