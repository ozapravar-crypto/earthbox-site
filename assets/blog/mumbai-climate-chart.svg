<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" fill="none">
  <style>
    .label { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #4A4A4A; }
    .label-bold { font-family: 'Quattrocento Sans', sans-serif; font-size: 12px; fill: #2C2C2B; font-weight: bold; }
    .title { font-family: 'Oranienbaum', serif; font-size: 20px; fill: #2C2C2B; }
    .axis-label { font-family: 'Quattrocento Sans', sans-serif; font-size: 10px; fill: #787878; }
    .month { font-family: 'Quattrocento Sans', sans-serif; font-size: 10px; fill: #4A4A4A; }
    .legend { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #4A4A4A; }
  </style>

  <!-- Background -->
  <rect width="700" height="420" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title">Mumbai Climate: Temperature &amp; Humidity by Month</text>

  <!-- Chart area -->
  <rect x="80" y="60" width="550" height="280" fill="#FAFAF8" stroke="#EFECE5" stroke-width="1"/>

  <!-- Grid lines (horizontal) -->
  <g stroke="#EFECE5" stroke-width="1">
    <line x1="80" y1="116" x2="630" y2="116"/>
    <line x1="80" y1="172" x2="630" y2="172"/>
    <line x1="80" y1="228" x2="630" y2="228"/>
    <line x1="80" y1="284" x2="630" y2="284"/>
  </g>

  <!-- Y-axis labels (left - Temperature °C) -->
  <text x="70" y="64" text-anchor="end" class="axis-label">40°</text>
  <text x="70" y="120" text-anchor="end" class="axis-label">35°</text>
  <text x="70" y="176" text-anchor="end" class="axis-label">30°</text>
  <text x="70" y="232" text-anchor="end" class="axis-label">25°</text>
  <text x="70" y="288" text-anchor="end" class="axis-label">20°</text>
  <text x="70" y="344" text-anchor="end" class="axis-label">15°</text>
  <text x="25" y="200" text-anchor="middle" class="label-bold" transform="rotate(-90 25 200)">Temperature (°C)</text>

  <!-- Y-axis labels (right - Humidity %) -->
  <text x="640" y="64" class="axis-label">100%</text>
  <text x="640" y="120" class="axis-label">90%</text>
  <text x="640" y="176" class="axis-label">80%</text>
  <text x="640" y="232" class="axis-label">70%</text>
  <text x="640" y="288" class="axis-label">60%</text>
  <text x="640" y="344" class="axis-label">50%</text>
  <text x="675" y="200" text-anchor="middle" class="label-bold" transform="rotate(90 675 200)">Humidity (%)</text>

  <!-- X-axis (months) -->
  <g class="month">
    <text x="103" y="355">Jan</text>
    <text x="148" y="355">Feb</text>
    <text x="193" y="355">Mar</text>
    <text x="238" y="355">Apr</text>
    <text x="283" y="355">May</text>
    <text x="328" y="355">Jun</text>
    <text x="373" y="355">Jul</text>
    <text x="418" y="355">Aug</text>
    <text x="463" y="355">Sep</text>
    <text x="508" y="355">Oct</text>
    <text x="553" y="355">Nov</text>
    <text x="598" y="355">Dec</text>
  </g>

  <!-- Monsoon highlight zone (Jun-Sep) -->
  <rect x="310" y="60" width="180" height="280" fill="#A8D4E6" opacity="0.15"/>
  <text x="400" y="75" text-anchor="middle" class="label" style="fill:#6BA3BE;">Monsoon Season</text>

  <!-- Temperature line (red/orange) -->
  <!-- Mumbai temps: Jan:25, Feb:26, Mar:28, Apr:30, May:32, Jun:30, Jul:28, Aug:28, Sep:29, Oct:30, Nov:29, Dec:27 -->
  <polyline
    points="103,228 148,216 193,192 238,168 283,144 328,168 373,192 418,192 463,180 508,168 553,180 598,204"
    fill="none" stroke="#E67E22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Temperature dots -->
  <g fill="#E67E22">
    <circle cx="103" cy="228" r="4"/>
    <circle cx="148" cy="216" r="4"/>
    <circle cx="193" cy="192" r="4"/>
    <circle cx="238" cy="168" r="4"/>
    <circle cx="283" cy="144" r="4"/>
    <circle cx="328" cy="168" r="4"/>
    <circle cx="373" cy="192" r="4"/>
    <circle cx="418" cy="192" r="4"/>
    <circle cx="463" cy="180" r="4"/>
    <circle cx="508" cy="168" r="4"/>
    <circle cx="553" cy="180" r="4"/>
    <circle cx="598" cy="204" r="4"/>
  </g>

  <!-- Humidity line (blue) -->
  <!-- Mumbai humidity: Jan:60, Feb:58, Mar:62, Apr:68, May:70, Jun:85, Jul:92, Aug:90, Sep:85, Oct:75, Nov:65, Dec:62 -->
  <polyline
    points="103,284 148,296 193,280 238,256 283,244 328,172 373,116 418,128 463,172 508,220 553,268 598,280"
    fill="none" stroke="#6BA3BE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Humidity dots -->
  <g fill="#6BA3BE">
    <circle cx="103" cy="284" r="4"/>
    <circle cx="148" cy="296" r="4"/>
    <circle cx="193" cy="280" r="4"/>
    <circle cx="238" cy="256" r="4"/>
    <circle cx="283" cy="244" r="4"/>
    <circle cx="328" cy="172" r="4"/>
    <circle cx="373" cy="116" r="4"/>
    <circle cx="418" cy="128" r="4"/>
    <circle cx="463" cy="172" r="4"/>
    <circle cx="508" cy="220" r="4"/>
    <circle cx="553" cy="268" r="4"/>
    <circle cx="598" cy="280" r="4"/>
  </g>

  <!-- Legend -->
  <rect x="200" y="375" width="300" height="35" rx="4" fill="#F8F7F5" stroke="#EFECE5" stroke-width="1"/>
  <line x1="220" y1="392" x2="250" y2="392" stroke="#E67E22" stroke-width="2.5"/>
  <circle cx="235" cy="392" r="4" fill="#E67E22"/>
  <text x="260" y="396" class="legend">Temperature (°C)</text>
  <line x1="370" y1="392" x2="400" y2="392" stroke="#6BA3BE" stroke-width="2.5"/>
  <circle cx="385" cy="392" r="4" fill="#6BA3BE"/>
  <text x="410" y="396" class="legend">Humidity (%)</text>

  <!-- Annotation for peak humidity -->
  <line x1="373" y1="116" x2="373" y2="95" stroke="#6BA3BE" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="373" y="90" text-anchor="middle" class="label" style="fill:#6BA3BE; font-weight:bold;">92%</text>

  <!-- Annotation for peak temp -->
  <line x1="283" y1="144" x2="283" y2="125" stroke="#E67E22" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="283" y="120" text-anchor="middle" class="label" style="fill:#E67E22; font-weight:bold;">32°C</text>
</svg>