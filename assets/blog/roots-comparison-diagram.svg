<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 400" fill="none">
  <style>
    .label { font-family: 'Quattrocento Sans', sans-serif; font-size: 12px; fill: #4A4A4A; }
    .title { font-family: 'Oranienbaum', serif; font-size: 20px; fill: #2C2C2B; }
    .heading { font-family: 'Oranienbaum', serif; font-size: 16px; fill: #2C2C2B; }
    .detail { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #787878; }
  </style>

  <!-- Background -->
  <rect width="650" height="400" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="325" y="35" text-anchor="middle" class="title">Healthy Roots vs Waterlogged Roots</text>

  <!-- Left side: Healthy -->
  <rect x="30" y="55" width="280" height="330" rx="6" fill="#6B8E5A" opacity="0.1" stroke="#6B8E5A" stroke-width="1.5"/>
  <text x="170" y="80" text-anchor="middle" class="heading" style="fill:#6B8E5A;">✓ Healthy Roots</text>

  <!-- Healthy pot cross-section -->
  <rect x="70" y="120" width="200" height="180" rx="4" fill="#EFECE5" stroke="#9A8A7B" stroke-width="1.5"/>

  <!-- Healthy soil with air pockets -->
  <rect x="80" y="140" width="180" height="150" fill="#8B7355"/>
  <!-- Air pockets -->
  <g fill="#F8F7F5" opacity="0.6">
    <circle cx="110" cy="180" r="6"/>
    <circle cx="150" cy="200" r="5"/>
    <circle cx="200" cy="170" r="7"/>
    <circle cx="230" cy="210" r="5"/>
    <circle cx="130" cy="240" r="6"/>
    <circle cx="180" cy="250" r="4"/>
    <circle cx="220" cy="260" r="5"/>
  </g>

  <!-- Healthy roots (white, firm) -->
  <g stroke="#F5F0E8" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M170 150 L170 200 Q160 230 150 260"/>
    <path d="M170 170 Q140 190 120 220"/>
    <path d="M170 170 Q200 190 220 215"/>
    <path d="M170 190 Q150 220 140 250"/>
    <path d="M170 190 Q190 215 200 250"/>
    <path d="M150 220 Q135 240 130 270"/>
    <path d="M220 215 Q230 240 235 265"/>
  </g>
  <!-- Root tips -->
  <g fill="#F5F0E8">
    <circle cx="150" cy="260" r="4"/>
    <circle cx="120" cy="220" r="3"/>
    <circle cx="220" cy="215" r="3"/>
    <circle cx="140" cy="250" r="3"/>
    <circle cx="200" cy="250" r="3"/>
    <circle cx="130" cy="270" r="3"/>
    <circle cx="235" cy="265" r="3"/>
  </g>

  <!-- Drainage arrows -->
  <g stroke="#6BA3BE" stroke-width="1.5" fill="none" stroke-dasharray="4 2">
    <path d="M100 290 L100 310"/>
    <path d="M170 290 L170 310"/>
    <path d="M240 290 L240 310"/>
  </g>

  <!-- Healthy labels -->
  <text x="170" y="320" text-anchor="middle" class="label" style="fill:#6B8E5A;">White, firm roots</text>
  <text x="170" y="335" text-anchor="middle" class="detail">Soil has air pockets</text>
  <text x="170" y="350" text-anchor="middle" class="detail">Water drains freely</text>
  <text x="170" y="365" text-anchor="middle" class="detail">Roots can breathe</text>

  <!-- VS divider -->
  <line x1="325" y1="70" x2="325" y2="370" stroke="#E5E2DB" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="325" cy="200" r="20" fill="#F8F7F5" stroke="#E5E2DB" stroke-width="2"/>
  <text x="325" y="205" text-anchor="middle" class="label" style="font-weight:bold;">VS</text>

  <!-- Right side: Waterlogged -->
  <rect x="340" y="55" width="280" height="330" rx="6" fill="#C0392B" opacity="0.1" stroke="#C0392B" stroke-width="1.5"/>
  <text x="480" y="80" text-anchor="middle" class="heading" style="fill:#C0392B;">✗ Waterlogged Roots</text>

  <!-- Waterlogged pot cross-section -->
  <rect x="380" y="120" width="200" height="180" rx="4" fill="#EFECE5" stroke="#9A8A7B" stroke-width="1.5"/>

  <!-- Waterlogged soil (saturated, darker) -->
  <rect x="390" y="140" width="180" height="150" fill="#5D4E3C"/>
  <!-- Water saturation indication -->
  <rect x="390" y="200" width="180" height="90" fill="#6BA3BE" opacity="0.3"/>

  <!-- Waterlogged roots (brown, mushy) -->
  <g stroke="#4A3728" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M480 150 L480 190 Q475 210 470 230"/>
    <path d="M480 165 Q455 180 445 200"/>
    <path d="M480 165 Q505 175 515 195"/>
    <path d="M480 180 Q465 200 460 220"/>
    <path d="M480 180 Q495 195 500 215"/>
  </g>
  <!-- Rotting root tips (darker, irregular) -->
  <g fill="#3D2E1F">
    <ellipse cx="470" cy="230" rx="6" ry="4"/>
    <ellipse cx="445" cy="200" rx="5" ry="3"/>
    <ellipse cx="515" cy="195" rx="4" ry="3"/>
    <ellipse cx="460" cy="220" rx="5" ry="3"/>
    <ellipse cx="500" cy="215" rx="4" ry="3"/>
  </g>

  <!-- Stagnant water indication -->
  <path d="M395 280 Q440 275 480 282 Q520 289 565 278" stroke="#6BA3BE" stroke-width="2" fill="none"/>
  <text x="480" y="275" text-anchor="middle" class="detail" style="fill:#6BA3BE;">Standing water</text>

  <!-- Waterlogged labels -->
  <text x="480" y="320" text-anchor="middle" class="label" style="fill:#C0392B;">Brown, mushy roots</text>
  <text x="480" y="335" text-anchor="middle" class="detail">No air in soil</text>
  <text x="480" y="350" text-anchor="middle" class="detail">Water can't drain</text>
  <text x="480" y="365" text-anchor="middle" class="detail">Roots suffocate & rot</text>

  <!-- Warning indicator -->
  <g transform="translate(580, 100)">
    <polygon points="0,-15 13,10 -13,10" fill="#C0392B"/>
    <text x="0" y="5" text-anchor="middle" style="fill:#F8F7F5; font-size:14px; font-weight:bold;">!</text>
  </g>
</svg>