<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" fill="none">
  <style>
    .label { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #4A4A4A; }
    .title { font-family: 'Oranienbaum', serif; font-size: 20px; fill: #2C2C2B; }
    .heading { font-family: 'Oranienbaum', serif; font-size: 14px; fill: #2C2C2B; }
    .detail { font-family: 'Quattrocento Sans', sans-serif; font-size: 10px; fill: #787878; }
  </style>

  <!-- Background -->
  <rect width="700" height="380" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title">Cradle Design: Stress Distribution Analysis</text>

  <!-- Left: Circular Profile -->
  <rect x="30" y="50" width="300" height="300" rx="6" fill="#E67E22" opacity="0.08" stroke="#E67E22" stroke-width="1"/>
  <text x="180" y="75" text-anchor="middle" class="heading">Circular Profile</text>
  <text x="180" y="92" text-anchor="middle" class="detail">Stress concentrates at contact points</text>

  <!-- Circular cradle shape -->
  <g transform="translate(180, 200)">
    <!-- Circular arc cradle -->
    <path d="M-80 0 A80 80 0 0 1 80 0" fill="none" stroke="#9A8A7B" stroke-width="8" stroke-linecap="round"/>

    <!-- Pot sitting in cradle -->
    <ellipse cx="0" cy="-30" rx="50" ry="20" fill="#C4A574" stroke="#9A8A7B" stroke-width="1.5"/>
    <rect x="-50" y="-30" width="100" height="60" fill="#C4A574"/>
    <ellipse cx="0" cy="30" rx="50" ry="20" fill="#B8A99A" stroke="#9A8A7B" stroke-width="1.5"/>

    <!-- Weight arrow -->
    <line x1="0" y1="-60" x2="0" y2="-40" stroke="#2C2C2B" stroke-width="2" marker-end="url(#arrowBlack)"/>
    <text x="0" y="-70" text-anchor="middle" class="detail">Weight</text>

    <!-- Stress concentration points (red) -->
    <circle cx="-45" cy="15" r="8" fill="#E67E22" opacity="0.8"/>
    <circle cx="45" cy="15" r="8" fill="#E67E22" opacity="0.8"/>

    <!-- Stress arrows at contact points -->
    <g stroke="#E67E22" stroke-width="2">
      <line x1="-45" y1="15" x2="-60" y2="30"/>
      <line x1="-45" y1="15" x2="-55" y2="5"/>
      <line x1="45" y1="15" x2="60" y2="30"/>
      <line x1="45" y1="15" x2="55" y2="5"/>
    </g>
  </g>

  <!-- Circular profile issues -->
  <g transform="translate(50, 290)">
    <circle cx="8" cy="8" r="5" fill="#E67E22"/>
    <text x="20" y="12" class="label">Two-point contact</text>
    <circle cx="8" cy="28" r="5" fill="#E67E22"/>
    <text x="20" y="32" class="label">High stress concentration</text>
    <circle cx="8" cy="48" r="5" fill="#E67E22"/>
    <text x="20" y="52" class="label">Risk of cracking over time</text>
  </g>

  <!-- Divider -->
  <line x1="350" y1="60" x2="350" y2="340" stroke="#E5E2DB" stroke-width="2"/>

  <!-- Right: Parabolic Profile -->
  <rect x="370" y="50" width="300" height="300" rx="6" fill="#6B8E5A" opacity="0.08" stroke="#6B8E5A" stroke-width="1"/>
  <text x="520" y="75" text-anchor="middle" class="heading">Parabolic Profile</text>
  <text x="520" y="92" text-anchor="middle" class="detail">Stress distributes evenly along curve</text>

  <!-- Parabolic cradle shape -->
  <g transform="translate(520, 200)">
    <!-- Parabolic arc cradle -->
    <path d="M-80 20 Q-40 -40 0 -50 Q40 -40 80 20" fill="none" stroke="#6B8E5A" stroke-width="8" stroke-linecap="round"/>

    <!-- Pot sitting in cradle -->
    <ellipse cx="0" cy="-30" rx="50" ry="20" fill="#C4A574" stroke="#9A8A7B" stroke-width="1.5"/>
    <rect x="-50" y="-30" width="100" height="60" fill="#C4A574"/>
    <ellipse cx="0" cy="30" rx="50" ry="20" fill="#B8A99A" stroke="#9A8A7B" stroke-width="1.5"/>

    <!-- Weight arrow -->
    <line x1="0" y1="-60" x2="0" y2="-40" stroke="#2C2C2B" stroke-width="2" marker-end="url(#arrowBlack)"/>
    <text x="0" y="-70" text-anchor="middle" class="detail">Weight</text>

    <!-- Even stress distribution (green gradient along curve) -->
    <g fill="#6B8E5A" opacity="0.5">
      <circle cx="-60" cy="5" r="4"/>
      <circle cx="-45" cy="-15" r="4"/>
      <circle cx="-25" cy="-30" r="4"/>
      <circle cx="0" cy="-35" r="4"/>
      <circle cx="25" cy="-30" r="4"/>
      <circle cx="45" cy="-15" r="4"/>
      <circle cx="60" cy="5" r="4"/>
    </g>

    <!-- Distributed force arrows -->
    <g stroke="#6B8E5A" stroke-width="1.5" opacity="0.7">
      <line x1="-55" y1="0" x2="-65" y2="10"/>
      <line x1="-40" y1="-20" x2="-50" y2="-25"/>
      <line x1="-20" y1="-32" x2="-25" y2="-42"/>
      <line x1="0" y1="-38" x2="0" y2="-50"/>
      <line x1="20" y1="-32" x2="25" y2="-42"/>
      <line x1="40" y1="-20" x2="50" y2="-25"/>
      <line x1="55" y1="0" x2="65" y2="10"/>
    </g>
  </g>

  <!-- Parabolic profile benefits -->
  <g transform="translate(390, 290)">
    <circle cx="8" cy="8" r="5" fill="#6B8E5A"/>
    <text x="20" y="12" class="label">Continuous contact surface</text>
    <circle cx="8" cy="28" r="5" fill="#6B8E5A"/>
    <text x="20" y="32" class="label">Even stress distribution</text>
    <circle cx="8" cy="48" r="5" fill="#6B8E5A"/>
    <text x="20" y="52" class="label">Longer structural life</text>
  </g>

  <!-- EarthBox choice indicator -->
  <rect x="480" y="42" width="120" height="20" rx="3" fill="#6B8E5A"/>
  <text x="540" y="56" text-anchor="middle" style="fill:#F8F7F5; font-size:10px; font-weight:bold;">EarthBox Choice</text>

  <defs>
    <marker id="arrowBlack" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2C2C2B"/>
    </marker>
  </defs>
</svg>