<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450" fill="none">
  <style>
    .label { font-family: 'Quattrocento Sans', sans-serif; font-size: 12px; fill: #4A4A4A; }
    .label-sm { font-family: 'Quattrocento Sans', sans-serif; font-size: 11px; fill: #787878; }
    .title { font-family: 'Oranienbaum', serif; font-size: 22px; fill: #2C2C2B; }
    .part-label { font-family: 'Oranienbaum', serif; font-size: 14px; fill: #2C2C2B; }
  </style>

  <!-- Background -->
  <rect width="600" height="450" fill="#F8F7F5"/>

  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" class="title">Planter Drainage System Cross-Section</text>

  <!-- Planter outer wall (left half cut away) -->
  <path d="M150 400 L150 120 Q150 80 190 80 L410 80 Q450 80 450 120 L450 400"
        fill="#EFECE5" stroke="#2C2C2B" stroke-width="2"/>

  <!-- Inner chamber walls -->
  <path d="M170 380 L170 140 Q170 110 200 110 L400 110 Q430 110 430 140 L430 380"
        fill="#F8F7F5" stroke="#9A8A7B" stroke-width="1.5"/>

  <!-- Elevated inner platform (false bottom) -->
  <rect x="185" y="320" width="230" height="15" fill="#B8A99A" stroke="#9A8A7B" stroke-width="1"/>

  <!-- Drainage holes in platform -->
  <g fill="#787878">
    <circle cx="220" cy="327" r="6"/>
    <circle cx="270" cy="327" r="6"/>
    <circle cx="320" cy="327" r="6"/>
    <circle cx="370" cy="327" r="6"/>
  </g>

  <!-- Support feet -->
  <rect x="190" y="335" width="15" height="45" fill="#9A8A7B" stroke="#787878" stroke-width="1"/>
  <rect x="280" y="335" width="15" height="45" fill="#9A8A7B" stroke="#787878" stroke-width="1"/>
  <rect x="370" y="335" width="15" height="45" fill="#9A8A7B" stroke="#787878" stroke-width="1"/>

  <!-- Water reservoir at bottom -->
  <rect x="170" y="365" width="260" height="20" fill="#A8D4E6" opacity="0.5"/>
  <path d="M175 370 Q220 368 270 372 Q320 376 370 370 Q410 365 425 372"
        stroke="#6BA3BE" stroke-width="1.5" fill="none"/>

  <!-- Soil in planter -->
  <path d="M185 320 L185 180 Q185 160 210 160 L390 160 Q415 160 415 180 L415 320 Z"
        fill="#8B7355"/>

  <!-- Soil texture -->
  <g fill="#9A8A7B" opacity="0.4">
    <circle cx="220" cy="200" r="4"/>
    <circle cx="280" cy="220" r="3"/>
    <circle cx="340" cy="195" r="4"/>
    <circle cx="380" cy="230" r="3"/>
    <circle cx="250" cy="260" r="4"/>
    <circle cx="310" cy="280" r="3"/>
    <circle cx="370" cy="270" r="4"/>
    <circle cx="210" cy="290" r="3"/>
  </g>

  <!-- Plant -->
  <g transform="translate(300, 140)">
    <path d="M0 20 Q-40 -10 -35 -50 M0 20 Q-20 -20 -10 -60 M0 20 Q0 -30 5 -65 M0 20 Q25 -15 20 -55 M0 20 Q45 0 40 -40"
          stroke="#6B8E5A" stroke-width="3" fill="none" stroke-linecap="round"/>
    <ellipse cx="-35" cy="-50" rx="12" ry="8" fill="#7DA469"/>
    <ellipse cx="-10" cy="-60" rx="14" ry="9" fill="#8AB87A"/>
    <ellipse cx="5" cy="-65" rx="15" ry="10" fill="#7DA469"/>
    <ellipse cx="20" cy="-55" rx="13" ry="8" fill="#8AB87A"/>
    <ellipse cx="40" cy="-40" rx="11" ry="7" fill="#6B8E5A"/>
  </g>

  <!-- Water flow arrows (drainage) -->
  <g stroke="#6BA3BE" stroke-width="1.5" fill="none">
    <path d="M220 310 L220 340 L220 365" marker-end="url(#waterArrow)"/>
    <path d="M320 310 L320 340 L320 365" marker-end="url(#waterArrow)"/>
  </g>

  <!-- Labels with lines -->
  <!-- Soil -->
  <line x1="430" y1="240" x2="480" y2="240" stroke="#B8A99A" stroke-width="1"/>
  <text x="490" y="235" class="part-label">Soil Mix</text>
  <text x="490" y="250" class="label">Drains freely</text>

  <!-- Elevated platform -->
  <line x1="420" y1="327" x2="480" y2="310" stroke="#B8A99A" stroke-width="1"/>
  <text x="490" y="305" class="part-label">False Bottom</text>
  <text x="490" y="320" class="label">Drainage holes</text>
  <text x="490" y="335" class="label-sm">Keeps roots above water</text>

  <!-- Support feet -->
  <line x1="400" y1="355" x2="480" y2="370" stroke="#B8A99A" stroke-width="1"/>
  <text x="490" y="365" class="part-label">Support Feet</text>
  <text x="490" y="380" class="label">Creates reservoir space</text>

  <!-- Water reservoir -->
  <line x1="170" y1="375" x2="120" y2="390" stroke="#B8A99A" stroke-width="1"/>
  <text x="30" y="385" class="part-label">Water Reservoir</text>
  <text x="30" y="400" class="label">Excess water collects</text>
  <text x="30" y="415" class="label-sm">Empty periodically</text>

  <!-- Outer wall label -->
  <line x1="150" y1="200" x2="100" y2="180" stroke="#B8A99A" stroke-width="1"/>
  <text x="30" y="175" class="part-label">Outer Wall</text>
  <text x="30" y="190" class="label">3D printed PLA</text>

  <!-- Drainage direction indicator -->
  <rect x="230" y="395" width="140" height="35" rx="4" fill="#A8D4E6" opacity="0.2" stroke="#6BA3BE" stroke-width="1"/>
  <text x="300" y="412" text-anchor="middle" class="label" style="fill:#6BA3BE;">↓ Water flows down</text>
  <text x="300" y="425" text-anchor="middle" class="label-sm">Roots stay aerated</text>

  <defs>
    <marker id="waterArrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6BA3BE"/>
    </marker>
  </defs>
</svg>